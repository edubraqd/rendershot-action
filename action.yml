name: 'RenderShot Screenshot'
description: 'Capture a website screenshot (PNG/JPEG/WebP) via the RenderShot API on RapidAPI. No local Chromium needed.'
author: 'RenderShot'
branding:
  icon: 'camera'
  color: 'purple'

inputs:
  api-key:
    description: 'Your RapidAPI key (X-RapidAPI-Key). Store it in a repository secret. Billing/quota is handled by RapidAPI.'
    required: true
  url:
    description: 'URL of the page to capture (http/https).'
    required: true
  output:
    description: 'Relative path to write the captured file.'
    required: false
    default: 'screenshot.png'
  type:
    description: 'Output format: png, jpeg or webp.'
    required: false
    default: 'png'
  full-page:
    description: 'Capture the full scrollable page (true/false).'
    required: false
    default: 'true'
  device:
    description: 'Device preset: iphone_15, iphone_se, pixel_7, galaxy_s9, ipad, ipad_pro.'
    required: false
    default: ''
  wait-for-selector:
    description: 'Wait for a CSS selector to appear before capturing.'
    required: false
    default: ''
  delay:
    description: 'Extra wait in milliseconds before capturing.'
    required: false
    default: ''
  dark-mode:
    description: 'Emulate dark color scheme (true/false).'
    required: false
    default: 'false'
  block-ads:
    description: 'Block ad/tracker requests (true/false).'
    required: false
    default: 'false'
  block-cookie-banners:
    description: 'Hide cookie/consent banners (true/false).'
    required: false
    default: 'true'
  rapidapi-host:
    description: 'RapidAPI host for the RenderShot API.'
    required: false
    default: 'screenshot-e-pdf-render.p.rapidapi.com'

runs:
  using: 'composite'
  steps:
    - name: Capture screenshot via RenderShot (RapidAPI)
      shell: bash
      # All inputs are passed through the environment — never interpolated into
      # the script body — so a malicious value cannot inject shell commands.
      env:
        RS_KEY: ${{ inputs.api-key }}
        RS_URL: ${{ inputs.url }}
        RS_OUTPUT: ${{ inputs.output }}
        RS_TYPE: ${{ inputs.type }}
        RS_FULLPAGE: ${{ inputs.full-page }}
        RS_DEVICE: ${{ inputs.device }}
        RS_WAITFOR: ${{ inputs.wait-for-selector }}
        RS_DELAY: ${{ inputs.delay }}
        RS_DARK: ${{ inputs.dark-mode }}
        RS_BLOCKADS: ${{ inputs.block-ads }}
        RS_BLOCKCOOKIES: ${{ inputs.block-cookie-banners }}
        RS_HOST: ${{ inputs.rapidapi-host }}
      run: |
        set -euo pipefail
        echo "::add-mask::$RS_KEY"

        # --- validate inputs ---
        [ -n "$RS_KEY" ] || { echo "::error::api-key is required (your RapidAPI key)"; exit 1; }
        case "$RS_URL" in http://*|https://*) ;; *) echo "::error::url must start with http:// or https://"; exit 1 ;; esac
        case "$RS_TYPE" in png|jpeg|webp) ;; *) echo "::error::type must be png, jpeg or webp"; exit 1 ;; esac
        case "$RS_FULLPAGE" in true|false) ;; *) echo "::error::full-page must be true or false"; exit 1 ;; esac
        case "$RS_DARK" in true|false) ;; *) echo "::error::dark-mode must be true or false"; exit 1 ;; esac
        case "$RS_BLOCKADS" in true|false) ;; *) echo "::error::block-ads must be true or false"; exit 1 ;; esac
        case "$RS_BLOCKCOOKIES" in true|false) ;; *) echo "::error::block-cookie-banners must be true or false"; exit 1 ;; esac
        [ -z "$RS_DELAY" ] || case "$RS_DELAY" in ''|*[!0-9]*) echo "::error::delay must be an integer (ms)"; exit 1 ;; esac
        case "$RS_OUTPUT" in /*|*..*) echo "::error::output must be a relative path without '..'"; exit 1 ;; esac

        # --- build request (values are data-urlencoded, not evaluated) ---
        args=( --get
               --data-urlencode "url=$RS_URL"
               --data-urlencode "type=$RS_TYPE"
               --data-urlencode "fullPage=$RS_FULLPAGE"
               --data-urlencode "darkMode=$RS_DARK"
               --data-urlencode "blockAds=$RS_BLOCKADS"
               --data-urlencode "blockCookieBanners=$RS_BLOCKCOOKIES" )
        [ -z "$RS_DEVICE" ]  || args+=( --data-urlencode "device=$RS_DEVICE" )
        [ -z "$RS_WAITFOR" ] || args+=( --data-urlencode "waitForSelector=$RS_WAITFOR" )
        [ -z "$RS_DELAY" ]   || args+=( --data-urlencode "delay=$RS_DELAY" )

        # --- call through the RapidAPI gateway (keeps billing/quota) ---
        http_code=$(curl -sS -w '%{http_code}' "${args[@]}" \
          -H "X-RapidAPI-Key: $RS_KEY" \
          -H "X-RapidAPI-Host: $RS_HOST" \
          "https://$RS_HOST/v1/screenshot" \
          --output "$RS_OUTPUT")

        if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
          echo "::error::RenderShot API returned HTTP $http_code"
          echo "Response body (truncated):"; head -c 500 "$RS_OUTPUT" 2>/dev/null || true; echo ""
          rm -f "$RS_OUTPUT"
          exit 1
        fi
        echo "Saved $RS_OUTPUT ($(wc -c < "$RS_OUTPUT" | tr -d ' ') bytes, HTTP $http_code)"
