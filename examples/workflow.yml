# Example workflow — copy this into .github/workflows/ in your own repository
# to capture a screenshot in CI. Add your key as a secret named RENDERSHOT_API_KEY.
name: RenderShot screenshot
on: [workflow_dispatch]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: edubraqd/rendershot-action@v1
        with:
          api-key: ${{ secrets.RENDERSHOT_API_KEY }}
          url: https://example.com
          output: rendershot-example.webp
          type: webp
          full-page: true

      - uses: actions/upload-artifact@v4
        with:
          name: rendershot-output
          path: rendershot-example.webp
